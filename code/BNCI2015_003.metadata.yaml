methodology: 'Participants surrounded by six speakers at ear height in circle (60° spacing, 65 cm radius). Each direction
  associated with unique combination of tone (base frequency + harmonics) and band-pass filtered noise. Two-step hex-o-spell
  interface for character selection. Session 1: calibration (48 trials, 8 per direction, 15 iterations each) followed by online
  spelling with 15 fixed iterations. Session 2: calibration followed by online spelling with dynamic stopping method (4-15
  iterations). Spatio-temporal feature extraction using r2 coefficient and interval selection (2-4 intervals for early and
  late components, 112-224 features total). Linear binary classifier with shrinkage regularization (Ledoit-Wolf). Decision
  making based on median classifier scores across iterations.'
